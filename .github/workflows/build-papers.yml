name: Build papers

on:
  push:
    paths:
      - 'papers/**'
      - '.github/workflows/build-papers.yml'
  pull_request:
    paths:
      - 'papers/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compile Paper 1 (MoBE-BCN)
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: papers
          root_file: 01-mobe-bcn.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Compile Paper 2 (Kazdov-LM, if present)
        if: ${{ hashFiles('papers/02-kazdov-lm.tex') != '' }}
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: papers
          root_file: 02-kazdov-lm.tex
          latexmk_use_xelatex: false
          latexmk_shell_escape: false
          args: -pdf -interaction=nonstopmode -file-line-error

      - name: Upload PDFs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kazdov-papers-pdf
          path: papers/*.pdf
          if-no-files-found: error
          retention-days: 90

      - name: Commit PDFs back to main (only on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add papers/*.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "ci: rebuild paper PDFs [skip ci]"
            git push
          fi
